<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#d97706">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MeyerTore Beta">
<link rel="manifest" href="manifest.webmanifest">
<title>MeyerTore 2.0 Beta</title>
<style>html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:#eef2ef}.beta-loading{padding:40px;text-align:center}.beta-error{margin:20px;padding:20px;background:#fff3cd;border:1px solid #f59e0b;border-radius:12px}</style>
</head>
<body><div class="beta-loading">MeyerTore 2.0 Beta wird geladen …</div>
<script>
(async()=>{
 try{
  const res=await fetch('../meyertore-app/index.html',{cache:'no-store'});
  let html=await res.text();
  html=html.replace(/<link rel="manifest"[^>]*>/i,'<link rel="manifest" href="manifest.webmanifest">');
  html=html.replace(/href="(?!https?:|\/|#)([^\"]+)"/g,'href="../meyertore-app/$1"');
  html=html.replace(/src="(?!https?:|\/|data:)([^\"]+)"/g,'src="../meyertore-app/$1"');
  html=html.replace('</head>','<link rel="stylesheet" href="beta.css"><link rel="stylesheet" href="work-menu.css"></head>');
  html=html.replace('</body>','<script src="beta.js"><\/script><script src="density-fix.js"><\/script><script src="work-menu.js"><\/script></body>');
  document.open();document.write(html);document.close();
 }catch(e){document.body.innerHTML='<div class="beta-error"><h2>Beta konnte nicht geladen werden</h2><p>Bitte Internetverbindung prüfen und neu laden.</p></div>'}
})();
</script>
</body></html>
